name: Evo
options:
  bundleIdPrefix: com.skproductions.evo

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.0
  Inject:
    url: https://github.com/krzysztofzablocki/Inject
    from: 1.5.2
  FaviconFinder:
    url: https://github.com/will-lumley/FavIconFinder
    exactVersion: 5.1.5
  SafariConverterLib:
    url: https://github.com/AdguardTeam/SafariConverterLib
    exactVersion: 4.2.2

targets:
  evo:
    type: application
    platform: "macOS"
    deploymentTarget: "15.0"
    sources:
      - path: evo
        excludes:
          - "Assets/Icons/**"
    resources:
      - path: evo/Shared/EmojiPicker/emoji-set.json
      - path: evo/Resources
        optional: true
    dependencies:
      - package: Sparkle
      - package: Inject
      - package: FaviconFinder
      - package: SafariConverterLib
        product: ContentBlockerConverter

    preBuildScripts:
      - name: "Copy Icon Bundle"
        inputFiles:
          - "$(SRCROOT)/evo/Assets/Icons/OraIcon.icon"
          - "$(SRCROOT)/evo/Assets/Icons/OraIconDev.icon"
        outputFiles:
          - "$(BUILT_PRODUCTS_DIR)/$(PRODUCT_NAME).app/Contents/Resources/OraIcon.icon"
          - "$(BUILT_PRODUCTS_DIR)/$(PRODUCT_NAME).app/Contents/Resources/OraIconDev.icon"
        script: |
          ICON_SRC_DEV="$SRCROOT/evo/Assets/Icons/OraIconDev.icon"
          ICON_SRC_RELEASE="$SRCROOT/evo/Assets/Icons/OraIcon.icon"
          ICON_DST="$BUILT_PRODUCTS_DIR/$PRODUCT_NAME.app/Contents/Resources/"
          if [ "$CONFIGURATION" = "Debug" ]; then
              echo "Using OraIconDev.icon for Debug build"
              cp -R "$ICON_SRC_DEV" "$ICON_DST"
          else
              echo "Using OraIcon.icon for Release build"
              cp -R "$ICON_SRC_RELEASE" "$ICON_DST"
          fi

    info:
      path: evo/Info/Info.plist
      properties:
        SUEnableAutomaticChecks: NO
        SUEnableInstallerLauncherService: NO
        CFBundleURLTypes:
          - CFBundleURLName: Evo Browser
            CFBundleTypeRole: Editor
            LSHandlerRank: Owner
            CFBundleURLSchemes:
              - http
              - https
        CFBundleDocumentTypes:
          - CFBundleTypeName: Web URL
            CFBundleTypeRole: Viewer
            LSHandlerRank: Owner
            LSItemContentTypes:
              - public.url
          - CFBundleTypeName: HTML document
            CFBundleTypeRole: Viewer
            LSHandlerRank: Default
            LSItemContentTypes:
              - public.html
          - CFBundleTypeName: XHTML document
            CFBundleTypeRole: Viewer
            LSHandlerRank: Default
            LSItemContentTypes:
              - public.xhtml
        NSUserActivityTypes:
          - NSUserActivityTypeBrowsingWeb
        LSMinimumSystemVersion: "15.0"
        LSApplicationCategoryType: public.app-category.web-browser

    entitlements:
      path: evo/Info/ora.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.assets.movies.read-only: true
        com.apple.security.assets.music.read-only: true
        com.apple.security.assets.pictures.read-only: true
        com.apple.security.cs.allow-jit: true
        com.apple.security.device.audio-input: true
        com.apple.security.device.camera: true
        com.apple.security.files.downloads.read-write: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.network.client: true
        com.apple.security.print: true
        com.apple.security.temporary-exception.mach-lookup.global-name:
          - "$(PRODUCT_BUNDLE_IDENTIFIER)-spks"
          - "$(PRODUCT_BUNDLE_IDENTIFIER)-spki"
        # com.apple.developer.web-browser and .public-key-credential are Apple-restricted
        # entitlements (default-browser registration + native passkey/WebAuthn provider).
        # Removed so automatic signing works without filing Request Access forms.
        # Re-add both if/when Apple approves access for this team.

    settings:
      base:
        SWIFT_VERSION: 5.9
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: 0.2.14
        CURRENT_PROJECT_VERSION: 105
        PRODUCT_NAME: Evo
        PRODUCT_BUNDLE_IDENTIFIER: com.skproductions.evobrowser
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SUEnableAutomaticChecks: NO
        SUEnableInstallerLauncherService: NO
      configs:
        Debug:
          ASSETCATALOG_COMPILER_APPICON_NAME: OraIconDev
          CODE_SIGN_ENTITLEMENTS: evo/Info/ora.entitlements
          CODE_SIGN_STYLE: Automatic
          EMIT_FRONTEND_COMMAND_LINES: YES
          OTHER_LDFLAGS: "-Xlinker -interposable"
          ENABLE_HARDENED_RUNTIME: NO
        Release:
          ASSETCATALOG_COMPILER_APPICON_NAME: OraIcon
          CODE_SIGN_ENTITLEMENTS: evo/Info/ora.entitlements
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Developer ID Application"
          ENABLE_HARDENED_RUNTIME: YES

  evoTests:
    type: bundle.unit-test
    platform: "macOS"
    deploymentTarget: "15.0"
    sources:
      - path: evoTests
    dependencies:
      - target: evo
    settings:
      base:
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Evo.app/Contents/MacOS/Evo"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  evo:
    shared: true
    build:
      targets:
        evo: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - evoTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
